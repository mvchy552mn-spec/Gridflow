<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GridFlow</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#1a1a2e,#0f0f0f);
  color:white;
}

/* LOGIN */
#auth {
  padding:30px;
  text-align:center;
}

input {
  display:block;
  margin:10px auto;
  padding:12px;
  width:80%;
  border-radius:10px;
  border:none;
}

button {
  margin:5px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:linear-gradient(135deg,#7C3AED,#4F46E5);
  color:white;
}

/* APP */
.app {
  display:none;
}

/* HEADER */
.header {
  display:flex;
  padding:20px;
}

.logo {
  width:40px;
  height:40px;
  border-radius:10px;
  background:linear-gradient(135deg,#7C3AED,#4F46E5);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-right:10px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  padding:20px;
}

.grid-item {
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  aspect-ratio:1/1;
}

.add-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  font-size:30px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <h2>GridFlow</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signUp()">Sign Up</button>
  <button onclick="signIn()">Login</button>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="header">
    <div class="logo">G</div>
    <h3>GridFlow</h3>
  </div>

  <div class="grid" id="grid"></div>
  <button class="add-btn" onclick="addImage()">+</button>
</div>

<script>
const SUPABASE_URL = "https://ifvndekvzgczoylcseph.supabase.co/rest/v1/";
const SUPABASE_KEY = "sb_publishable_nBISM_efXQcVQbHVFWS4MQ_iD7IdfFp";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
let images = [];

async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({ email, password });
  if (error) alert(error.message);
  else alert("Compte créé !");
}

async function signIn() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if (error) alert(error.message);
  else {
    user = data.user;
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadImages();
  }
}

async function loadImages() {
  const { data } = await supabaseClient
    .from("images")
    .select("*")
    .eq("user_id", user.id);

  images = data || [];
  render();
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let i = 0; i < 9; i++) {
    const div = document.createElement("div");
    div.className = "grid-item";

    if (images[i]) {
      const img = document.createElement("img");
      img.src = images[i].url;
      img.style.width = "100%";
      img.style.height = "100%";
      img.style.objectFit = "cover";
      img.style.borderRadius = "16px";
      div.appendChild(img);
    }

    grid.appendChild(div);
  }
}

function addImage() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";

  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = async (ev) => {
      const { data } = await supabaseClient
        .from("images")
        .insert([{ user_id: user.id, url: ev.target.result }]);

      loadImages();
    };

    reader.readAsDataURL(file);
  };

  input.click();
}
</script>

</body>
</html>
