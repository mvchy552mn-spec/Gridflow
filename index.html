<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GridFlow - Plan Your Feed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Ads -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0F0F0F;
  color:white;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo {
  font-size:20px;
  font-weight:bold;
}

/* HERO */
.hero {
  padding:20px;
}

.hero h1 {
  font-size:32px;
}

.hero p {
  color:#aaa;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:20px;
}

.grid-item {
  background:#1F1F1F;
  aspect-ratio:1/1;
  border-radius:12px;
}

/* BUTTON */
.add-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(135deg,#7C3AED,#4F46E5);
  color:white;
  font-size:30px;
  border:none;
}

/* SECTIONS */
.section {
  padding:20px;
  color:#aaa;
}

/* CTA */
.cta {
  text-align:center;
  padding:40px;
}

.cta button {
  padding:15px 25px;
  border:none;
  border-radius:25px;
  background:linear-gradient(135deg,#7C3AED,#4F46E5);
  color:white;
  font-size:16px;
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
  color:#666;
}
</style>
</head>

<body>

<nav>
  <div class="logo">GridFlow</div>
</nav>

<div class="hero">
  <h1>Plan Your Perfect Feed</h1>
  <p>Create, organize and preview your social media content.</p>
</div>

<!-- PUB -->
<div style="text-align:center; margin:10px;">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXXXXXX"
       data-ad-slot="123456"
       data-ad-format="auto"></ins>
</div>

<div class="grid" id="grid"></div>

<button class="add-btn">+</button>

<div class="section">
  GridFlow helps creators design their content visually before posting.
</div>

<div class="cta">
  <h2>Upgrade coming soon 🚀</h2>
  <button>Get Premium</button>
</div>

<footer>
© 2026 GridFlow
</footer>

<script>
const grid = document.getElementById("grid");
const btn = document.querySelector(".add-btn");

let images = JSON.parse(localStorage.getItem("grid")) || [];

for (let i = 0; i < 9; i++) {
  const d = document.createElement("div");
  d.className = "grid-item";
  grid.appendChild(d);
}

const items = document.querySelectorAll(".grid-item");

function render() {
  items.forEach((el, i) => {
    el.innerHTML = "";
    if (images[i]) {
      const img = document.createElement("img");
      img.src = images[i];
      img.style.width="100%";
      img.style.height="100%";
      img.style.objectFit="cover";
      img.style.borderRadius="12px";
      el.appendChild(img);
    }
  });
}

render();

const input = document.createElement("input");
input.type="file";
input.accept="image/*";

btn.onclick = () => input.click();

input.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = ev => {
    const i = images.findIndex(x => !x);
    if (i !== -1) {
      images[i] = ev.target.result;
      localStorage.setItem("grid", JSON.stringify(images));
      render();
    } else {
      alert("Grid full");
    }
  };

  reader.readAsDataURL(file);
};
</script>

</body>
</html>
